<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liquid glass — &lt;glass-nav&gt; web component</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; }
  body{ min-height:100vh; background:url("media/meadow.jpg") center/cover fixed no-repeat;
    font-family:"Plus Jakarta Sans","SF Pro Display","Inter",-apple-system,system-ui,sans-serif; color:#fff;
    -webkit-font-smoothing:antialiased; padding:60px 48px 120px; }
  .head{ max-width:980px; margin:0 auto 60px; text-shadow:0 1px 8px rgba(0,0,0,.4); }
  .head h1{ font-weight:800; font-size:30px; letter-spacing:-0.02em; margin:0 0 8px; }
  .head p{ font-size:14px; opacity:.85; margin:0; max-width:600px; line-height:1.55;
    font-family:"SF Pro Display","Inter",system-ui,sans-serif; }
  .head code{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px;
    background:rgba(255,255,255,0.16); padding:1px 6px; border-radius:5px; }
  .row{ display:flex; gap:104px; justify-content:center; flex-wrap:wrap; max-width:1200px; margin:0 auto; }
  /* each material name is its own dropdown trigger */
  glass-nav{ --glass-nav-trigger-size:16px; --glass-nav-trigger-weight:700; }
</style>
<script src="glass-nav.js" defer></script>
</head><body>
  <div class="head">
    <h1>&lt;glass-nav&gt;</h1>
    <p>One web component, three glass materials. Set <code>material</code>, give it a <code>label</code>,
       drop in <code>&lt;a&gt;</code> items — the refraction, animation, and keyboard handling come built in.</p>
  </div>
  <div class="row">
    <glass-nav open material="soft-frost" label="Soft Frost">
      <a href="#writing">Scribbles</a><a href="#log">Tinkering</a><a href="#now">Up to</a><a href="#contact">Knock knock</a>
    </glass-nav>
    <glass-nav open material="edge-lens" label="Edge Lens">
      <a href="#writing">Scribbles</a><a href="#log">Tinkering</a><a href="#now">Up to</a><a href="#contact">Knock knock</a>
    </glass-nav>
    <glass-nav open material="thick-crystal" label="Thick Crystal">
      <a href="#writing">Scribbles</a><a href="#log">Tinkering</a><a href="#now">Up to</a><a href="#contact">Knock knock</a>
    </glass-nav>
  </div>
</body></html>
